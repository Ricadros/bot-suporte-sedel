<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/jpeg" href="sedel.jpg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte TI — SEDEL</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --azul-escuro:  #1a4fa0;
      --azul-medio:   #1e6cc8;
      --azul-claro:   #0080c8;
      --verde:        #009b3a;
      --amarelo:      #ffcc00;
      --branco:       #ffffff;
      --cinza-fundo:  #f2f5fa;
      --cinza-borxda:  #dde3ee;
      --cinza-texto:  #4a5568;
      --sombra:       0 4px 24px rgba(26,79,160,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: var(--cinza-fundo);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── FAIXA DE TOPO ── */
    .topo-gov {
      width: 100%;
      max-width: 520px;
      background: var(--azul-escuro);
      border-radius: 14px 14px 0 0;
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
    }
    .topo-faixa-verde  { height: 5px; background: var(--verde);   flex: 1; }
    .topo-faixa-amarelo{ height: 5px; background: var(--amarelo); flex: 1; }
    .topo-faixa-azul   { height: 5px; background: var(--azul-claro); flex: 1; }

    /* ── CARD PRINCIPAL ── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--branco);
      border-radius: 0 0 14px 14px;
      box-shadow: var(--sombra);
      display: flex;
      flex-direction: column;
      height: 680px;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--azul-escuro);
      padding: 14px 20px 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo {
      height: 42px;
      border-radius: 6px;
      background: #fff;
      padding: 3px 6px;
      object-fit: contain;
    }
    .header-divider {
      width: 1px;
      height: 36px;
      background: rgba(255,255,255,0.25);
    }
    .header-info { flex: 1; }
    .header-info h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }
    .header-info p {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
    }
    .btn-novo {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-size: 11px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .btn-novo:hover { background: rgba(255,255,255,0.22); }

    /* ── FAIXA TRICOLOR FINA ── */
    .tricolor {
      display: flex;
      height: 3px;
    }
    .tricolor span:nth-child(1) { background: var(--verde);    flex: 1; }
    .tricolor span:nth-child(2) { background: var(--amarelo);  flex: 1; }
    .tricolor span:nth-child(3) { background: var(--azul-claro); flex: 1; }

    /* ── CHAT ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--cinza-fundo);
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--cinza-borda); border-radius: 4px; }

    /* ── MENSAGENS ── */
    .msg { display: flex; gap: 8px; max-width: 88%; animation: fadeUp .2s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end;   flex-direction: row-reverse; }

    .msg-av {
      width: 30px; height: 30px; min-width: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .msg.bot  .msg-av { background: var(--azul-escuro); }
    .msg.user .msg-av { background: var(--cinza-borda); }

    .msg-bubble {
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.6;
      white-space: pre-wrap;
      border-radius: 14px;
    }
    .msg.bot .msg-bubble {
      background: var(--branco);
      border: 1px solid var(--cinza-borda);
      color: #1a202c;
      border-top-left-radius: 3px;
    }
    .msg.user .msg-bubble {
      background: var(--azul-escuro);
      color: #fff;
      border-top-right-radius: 3px;
    }

    /* badges de nível */
    .badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      margin-left: 6px; vertical-align: middle;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.5px;
    }
    .badge-n0 { background:#dcfce7; color:#166534; }
    .badge-n1 { background:#dcfce7; color:#166534; }
    .badge-n2 { background:#fef9c3; color:#854d0e; }
    .badge-n3 { background:#fee2e2; color:#991b1b; }

    /* ── DIGITANDO ── */
    .typing { display:flex; gap:4px; align-items:center; padding:12px 14px; }
    .typing span {
      width:7px; height:7px; background:#aab4c8; border-radius:50%;
      animation: bounce 1.1s infinite;
    }
    .typing span:nth-child(2) { animation-delay:.18s; }
    .typing span:nth-child(3) { animation-delay:.36s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── COMPROVANTE ── */
    .chamado-card {
      background: #f0f7ff;
      border: 1px solid #b8d4f0;
      border-left: 4px solid var(--azul-medio);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: #1a3a6a;
    }
    .chamado-card .numero {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--azul-escuro);
    }

    /* ── OPÇÕES ── */
    .opcoes-area {
      padding: 8px 16px 6px;
      display: flex; flex-wrap: wrap; gap: 7px;
      background: var(--cinza-fundo);
      border-top: 1px solid var(--cinza-borda);
    }
    .opcao-btn {
      padding: 7px 15px;
      border: 1.5px solid var(--azul-escuro);
      border-radius: 20px;
      background: transparent;
      color: var(--azul-escuro);
      font-size: 12.5px;
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .opcao-btn:hover { background: var(--azul-escuro); color: #fff; }

    /* ── INPUT ── */
    .input-area {
      padding: 10px 14px;
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--branco);
      border-top: 1px solid var(--cinza-borda);
    }
    .input-area textarea {
      flex: 1; resize: none;
      border: 1.5px solid var(--cinza-borda);
      border-radius: 10px;
      padding: 9px 13px;
      font-size: 13.5px;
      font-family: 'Open Sans', sans-serif;
      max-height: 90px; outline: none;
      color: #1a202c;
      background: var(--cinza-fundo);
      transition: border-color 0.2s;
      line-height: 1.45;
    }
    .input-area textarea:focus { border-color: var(--azul-medio); background: #fff; }
    .send-btn {
      width: 40px; height: 40px; min-width: 40px;
      background: var(--azul-escuro);
      border: none; border-radius: 50%;
      color: #fff; font-size: 17px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .send-btn:hover { background: var(--azul-medio); }
    .send-btn:disabled { background: #aab4c8; cursor: not-allowed; }

    /* ── RODAPÉ ── */
    .footer {
      text-align: center;
      font-size: 10.5px;
      color: #8896aa;
      padding: 6px 0 2px;
      background: var(--branco);
      border-top: 1px solid var(--cinza-borda);
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

<!-- FAIXA TRICOLOR TOPO -->
<div class="topo-gov">
  <div class="topo-faixa-verde"></div>
  <div class="topo-faixa-amarelo"></div>
  <div class="topo-faixa-azul"></div>
</div>

<div class="card">

  <!-- HEADER -->
  <div class="header">
    <img src="sedel.jpg" alt="Logo SEDEL" class="header-logo" />
    <div class="header-divider"></div>
    <div class="header-info">
      <h1>Suporte de TI</h1>
      <p><span class="status-dot"></span> Assistente Virtual Online</p>
    </div>
    <button class="btn-novo" onclick="resetarConversa()">↺ NOVO</button>
  </div>

  <!-- TRICOLOR -->
  <div class="tricolor"><span></span><span></span><span></span></div>

  <!-- CHAT -->
  <div class="chat-area" id="chatArea"></div>

  <!-- OPÇÕES -->
  <div class="opcoes-area" id="opcoesArea"></div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea
      id="inputMensagem"
      placeholder="Digite sua mensagem..."
      rows="1"
      onkeydown="teclaEnter(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="enviarMensagem()" title="Enviar">➤</button>
  </div>

  <!-- RODAPÉ -->
  <div class="footer">Secretaria de Estado de Desporto e Lazer — SEDEL · AM</div>

</div>

<script>
  const API_URL   = 'http://localhost:3000/api/chat';
  const API_RESET = 'http://localhost:3000/api/reset';

  let sessionId = sessionStorage.getItem('sedel_session');
  if (!sessionId) {
    sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);
    sessionStorage.setItem('sedel_session', sessionId);
  }

  window.onload = () => iniciarConversa();

  async function iniciarConversa() {
    document.getElementById('chatArea').innerHTML = '';
    document.getElementById('opcoesArea').innerHTML = '';
    const resp = await enviarParaAPI('');
    if (resp) mostrarMensagemBot(resp);
  }

  async function enviarMensagem() {
    const input = document.getElementById('inputMensagem');
    const texto = input.value.trim();
    if (!texto) return;
    input.value = '';
    input.style.height = 'auto';
    limparOpcoes();
    adicionarMensagem('user', texto);
    mostrarDigitando();
    const resp = await enviarParaAPI(texto);
    removerDigitando();
    if (resp) mostrarMensagemBot(resp);
  }

  function clicarOpcao(texto) {
    limparOpcoes();
    adicionarMensagem('user', texto);
    mostrarDigitando();
    enviarParaAPI(texto).then(resp => {
      removerDigitando();
      if (resp) mostrarMensagemBot(resp);
    });
  }

  async function enviarParaAPI(mensagem) {
    try {
      const r = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensagem, sessionId })
      });
      return await r.json();
    } catch {
      return {
        resposta: '⚠️ Não foi possível conectar ao servidor.\nVerifique se o backend está rodando em localhost:3000.',
        opcoes: []
      };
    }
  }

  function mostrarMensagemBot(dados) {
    adicionarMensagem('bot', formatarTexto(dados.resposta), dados.tipoChamado);
    if (dados.numeroChamado) {
      const card = document.createElement('div');
      card.className = 'chamado-card';
      card.innerHTML = `🎫 Chamado registrado: <span class="numero">${dados.numeroChamado}</span>`;
      document.getElementById('chatArea').appendChild(card);
      document.getElementById('chatArea').scrollTop = 99999;
    }
    if (dados.opcoes && dados.opcoes.length > 0) renderizarOpcoes(dados.opcoes);
  }

  function formatarTexto(txt) {
    return txt
      .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
      .replace(/`(.*?)`/g, '<code style="background:#e8edf5;padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace">$1</code>')
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" style="color:#1a4fa0;text-decoration:underline" target="_blank">$1</a>');
  }

  function adicionarMensagem(tipo, texto, nivel) {
    const chatArea = document.getElementById('chatArea');
    const msg = document.createElement('div');
    msg.className = `msg ${tipo}`;

    const av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = tipo === 'bot' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = texto;

    if (nivel && tipo === 'bot') {
      const badge = document.createElement('span');
      badge.className = `badge badge-${nivel.toLowerCase()}`;
      badge.textContent = nivel;
      bubble.appendChild(badge);
    }

    msg.appendChild(av);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = 99999;
  }

  function renderizarOpcoes(opcoes) {
    const area = document.getElementById('opcoesArea');
    area.innerHTML = '';
    opcoes.forEach(op => {
      const btn = document.createElement('button');
      btn.className = 'opcao-btn';
      btn.textContent = op;
      btn.onclick = () => clicarOpcao(op);
      area.appendChild(btn);
    });
  }

  function limparOpcoes() { document.getElementById('opcoesArea').innerHTML = ''; }

  function mostrarDigitando() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typing-indicator';
    div.innerHTML = `<div class="msg-av">🤖</div>
      <div class="msg-bubble" style="padding:0">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = 99999;
  }

  function removerDigitando() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function resetarConversa() {
    await fetch(API_RESET, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId })
    }).catch(() => {});
    iniciarConversa();
  }

  function teclaEnter(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 90) + 'px';
  }
</script>
</body>
</html>
